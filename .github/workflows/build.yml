---
name: Build
on:
  push:
    branches:
      - master

jobs:

  test:
    name: Build Ansible Galaxy collection artifact.
    runs-on: ubuntu-latest

    steps:
      - name: Check out the codebase.
        uses: actions/checkout@v4

      - name: Perform git pull
        run: |
          cd ~/WayneHomeLab
          git fetch origin
          git pull --rebase origin main

      - name: Read Python version from requirements.yml
        run: echo "PYTHON_VERSION=$(cat requirements.yml | grep 'python_version:' | awk '{print $2}')" >> $GITHUB_ENV

      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install test dependencies.
        run: pip3 install ansible

      - name: Build artifact.
        run: ansible-galaxy collection build

      - name: Upload artifact.
        uses: actions/upload-artifact@v4
        with:
          name: galaxy-collection
          path: k3s-orchestration-*.tar.gz
