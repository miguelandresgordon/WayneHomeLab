name: Sync Git Repository

on:
  push:
    branches:
      - main

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v2

    - name: Perform git pull
      run: |
        cd ~/WayneHomeLab
        git fetch origin
        git pull --rebase origin main

    - name: Read Python version from requirements.yml
      run: echo "PYTHON_VERSION=$(cat requirements.yml | grep 'python_version:' | awk '{print $2}')" >> $GITHUB_ENV

    - name: Set up Python
      uses: actions/setup-python@v2
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: Set environment variables for token and private key
      run: |
        echo "K3S_TOKEN=${{ secrets.K3S_TOKEN }}" >> $GITHUB_ENV
        echo "${{ secrets.SSH_PRIVATE_KEY }}" > /home/runner/.ssh/id_rsa
        chmod 600 /home/runner/.ssh/id_rsa
        echo "PRIV_KEY_PATH=/home/runner/.ssh/id_rsa" >> $GITHUB_ENV
        echo "NODE1_HOST=${{ secrets.NODE1_HOST }}" >> $GITHUB_ENV
        echo "NODE1_USER=${{ secrets.NODE1_USER }}" >> $GITHUB_ENV
        echo "NODE2_HOST=${{ secrets.NODE2_HOST }}" >> $GITHUB_ENV
        echo "NODE2_USER=${{ secrets.NODE2_USER }}" >> $GITHUB_ENV

    - name: Run git pull on node1
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.NODE1_HOST }}
        username: ${{ secrets.NODE1_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        script: |
          cd ~/WayneHomeLab
          git fetch origin
          git pull --rebase origin main

    - name: Run git pull on node2
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.NODE2_HOST }}
        username: ${{ secrets.NODE2_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        script: |
          cd ~/WayneHomeLab
          git fetch origin
          git pull --rebase origin main
